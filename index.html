<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RunDiary — チーム練習日誌</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.22.0/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #f97316;
      --text: #f0f0f0;
      --muted: #777;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red-dark: #7f1d1d;
      --red-light: #fca5a5;
      --blue-dark: #1e3a5f;
      --blue-light: #93c5fd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
      min-height: 100vh;
    }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--accent); }
    .logo span { color: var(--text); font-weight: 300; }

    /* Mode toggle */
    .mode-toggle {
      display: flex; background: var(--surface2); border-radius: 20px; padding: 3px; gap: 2px;
    }
    .mode-btn {
      padding: 6px 14px; border-radius: 17px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 700; transition: all 0.2s;
      background: transparent; color: var(--muted);
    }
    .mode-btn.active-sparta { background: var(--red-dark); color: var(--red-light); }
    .mode-btn.active-gentle { background: var(--blue-dark); color: var(--blue-light); }

    /* Tabs */
    .tabs {
      display: flex; border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .tab-btn {
      flex: 1; padding: 13px; border: none; background: transparent;
      color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 600;
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Content */
    .content { max-width: 680px; margin: 0 auto; padding: 20px 16px; }

    /* Form */
    .form-group { margin-bottom: 18px; }
    label {
      display: block; font-size: 11px; color: var(--muted); margin-bottom: 7px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
    }
    input, select, textarea {
      width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 110px; font-family: inherit; line-height: 1.6; }
    select option { background: var(--surface2); }
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Stars */
    .stars { display: flex; gap: 8px; }
    .star {
      width: 38px; height: 38px; border: 2px solid var(--border); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      font-size: 14px; font-weight: 700; transition: all 0.15s; color: var(--muted);
      user-select: none;
    }
    .star.cond { border-color: var(--green); background: rgba(74,222,128,.12); color: var(--green); }
    .star.motiv { border-color: var(--yellow); background: rgba(251,191,36,.12); color: var(--yellow); }

    .sub-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

    .btn-primary {
      width: 100%; padding: 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s; letter-spacing: 0.3px;
    }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }

    /* Feed */
    .entry-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      margin-bottom: 12px; overflow: hidden;
    }
    .entry-header {
      padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
      transition: background 0.15s;
    }
    .entry-header:hover { background: var(--surface2); }
    .avatar {
      width: 42px; height: 42px; background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 17px; flex-shrink: 0; color: #fff;
    }
    .entry-meta { flex: 1; min-width: 0; }
    .entry-name { font-weight: 700; font-size: 14px; }
    .entry-date-row { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .badge {
      padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 600;
    }
    .badge-menu { background: #1e293b; color: var(--blue-light); }
    .badge-dist { background: rgba(74,222,128,.1); color: var(--green); }
    .badge-time { background: rgba(251,191,36,.1); color: var(--yellow); }
    .chevron { color: var(--muted); font-size: 11px; flex-shrink: 0; }

    .entry-body { border-top: 1px solid var(--border); padding: 14px 16px; }
    .score-row {
      display: flex; gap: 20px; margin-bottom: 12px; font-size: 12px; color: var(--muted);
    }
    .memo-text {
      font-size: 14px; color: #ccc; line-height: 1.75; white-space: pre-wrap;
      margin-bottom: 14px;
    }

    /* AI section */
    .ai-section { border-top: 1px solid var(--border); padding-top: 14px; }
    .btn-ai {
      padding: 9px 20px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 700; transition: all 0.18s; letter-spacing: 0.3px;
    }
    .btn-ai.sparta { background: var(--red-dark); color: var(--red-light); }
    .btn-ai.sparta:hover:not(:disabled) { background: #991b1b; }
    .btn-ai.gentle { background: var(--blue-dark); color: var(--blue-light); }
    .btn-ai.gentle:hover:not(:disabled) { background: #1e40af; }
    .btn-ai:disabled { opacity: 0.45; cursor: not-allowed; }

    .ai-result {
      margin-top: 12px; padding: 14px 16px; border-radius: 8px;
      font-size: 13px; line-height: 1.85; white-space: pre-wrap;
    }
    .ai-result.sparta { background: #1a0808; border: 1px solid #7f1d1d; color: #fecaca; }
    .ai-result.gentle { background: #080f1a; border: 1px solid #1e3a5f; color: #bfdbfe; }
    .ai-result-meta { font-size: 11px; color: var(--muted); margin-top: 6px; }

    .spinner { display: inline-block; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 14px; line-height: 2; }

    .section-hint {
      font-size: 12px; color: var(--muted); text-align: center; padding: 10px 0 4px;
      border-top: 1px solid var(--border); margin-top: 16px;
    }

    .menu-desc {
      margin-top: 7px; font-size: 12px; color: var(--muted); line-height: 1.6;
      padding: 8px 12px; background: var(--surface); border-radius: 6px;
      border-left: 2px solid var(--accent);
    }

    .share-toggle {
      display: flex; align-items: center; gap: 14px; cursor: pointer;
      padding: 12px 14px; background: var(--surface2); border-radius: 8px;
      border: 1px solid var(--border); transition: border-color 0.2s;
    }
    .share-toggle:hover { border-color: #444; }
    .toggle-track {
      width: 44px; height: 24px; background: #333; border-radius: 12px;
      position: relative; flex-shrink: 0; transition: background 0.2s;
    }
    .toggle-track.on { background: var(--accent); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px; width: 18px; height: 18px;
      background: #fff; border-radius: 50%; transition: transform 0.2s;
    }
    .toggle-track.on .toggle-thumb { transform: translateX(20px); }
    .toggle-label { font-size: 13px; font-weight: 600; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/** @jsxRuntime classic */
const { useState, useEffect } = React;

const SUPABASE_URL = 'https://rndewdcuvewyalxvfoqi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_pqSIdB7XK7-Dltr_AVBhLQ_yrOhwNSN';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const MENU_TYPES = ['ジョグ','ペース走','インターバル','閾値走','ロング走','レース','クロカン','補強・筋トレ','オフ','その他'];
const MENU_ICONS = {
  'ジョグ':'🏃','ペース走':'⚡','インターバル':'🔁','閾値走':'💨',
  'ロング走':'🛤️','レース':'🏆','クロカン':'🌲','補強・筋トレ':'💪','オフ':'🛋️','その他':'📋'
};
const MENU_DESC = {
  'ジョグ':       '会話できる強度（最大心拍65〜75%）で有酸素基盤を積み上げる基本練習',
  'ペース走':     '目標レースペース±5秒/kmで20〜40分継続。LT向上に効果的',
  'インターバル': '高強度（vVO2max相当）×短休憩を反復。速筋・心肺機能の強化',
  '閾値走':       'LT（乳酸性作業閾値）ペースで20〜30分。長距離のランニングエコノミー向上',
  'ロング走':     '最大心拍70%以下で90〜150分。脂質代謝・毛細血管密度の向上',
  'レース':       '公式または非公式の競技。フォーム・レースマネジメントの確認',
  'クロカン':     '不整地走で固有感覚・臀部・体幹を総合強化。怪我予防にも有効',
  '補強・筋トレ': 'コア・股関節・体幹の強化。ランニングフォームの安定に直結',
  'オフ':         '積極的休養日。筋の超回復を促し翌日の練習の質を高める',
  'その他':       '指定なしの練習やウォームアップ・クールダウン等',
};

function todayStr() { return new Date().toISOString().slice(0,10); }
function defaultForm() {
  return {
    entry_date: todayStr(),
    user_name: localStorage.getItem('diary_name') || '',
    menu_type: 'ジョグ',
    distance_km: '',
    time_min: '',
    condition_score: 3,
    motivation_score: 3,
    memo: '',
    is_public: true,
  };
}

async function callAI(prompt) {
  const res = await fetch('/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'gemini-2.5-flash',
      max_tokens: 800,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!res.ok) throw new Error(`AI relay error: HTTP ${res.status}`);
  const data = await res.json();
  return data.content.filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
}

function buildPrompt(entry, mode, goal) {
  const dist = entry.distance_km ? `${entry.distance_km}km` : '未記録';
  const time = entry.time_min ? `${entry.time_min}分` : '未記録';
  const pace = (entry.distance_km && entry.time_min)
    ? (() => { const s = Math.round(entry.time_min / entry.distance_km * 60); return `${Math.floor(s/60)}'${String(s%60).padStart(2,'0')}"／km`; })()
    : null;
  const cond = entry.condition_score || 3;
  const motiv = entry.motivation_score || 3;
  const memo = entry.memo || '（なし）';
  const goalLine = goal ? `目標: ${goal}` : '目標: 未設定';
  const paceInfo = pace ? `　平均ペース: ${pace}` : '';

  if (mode === 'sparta') {
    return `あなたはJack Danielsのランニングフォーミュラを熟知し、箱根駅伝・実業団で指導実績を持つ厳格なコーチです。生理学・トレーニング理論に基づき、選手の練習日誌を容赦なく分析してください。

【選手データ】
名前: ${entry.user_name}
${goalLine}
日付: ${entry.entry_date}
練習種別: ${entry.menu_type}
距離/時間: ${dist} / ${time}${paceInfo}
体調: ${cond}/5　モチベーション: ${motiv}/5
本人コメント: 「${memo}」

以下の各項目を専門的かつ具体的に、厳しく回答してください：
【練習の質評価】
今日の練習強度・量・種別をVO2max強度・LTペース・運動強度ゾーンの観点で数値根拠を交えて評価すること
【目標との整合性】
設定目標の達成に向け、今日の練習が適切だったか。不足点・過剰点を明確に
【問題点と改善指示】
フォーム・ペース配分・距離・本数・レスト等について具体的数値を挙げて指摘
【次回の練習処方】
目標に向けた具体的な練習内容（種別・距離・ペース・本数等）を処方として提示
【一言】
甘えを許さない、魂に響く激励`;
  } else {
    return `あなたはスポーツ科学と選手心理に精通した、選手に寄り添う優しいランニングコーチです。科学的根拠を大切にしながら、選手が自信を持って次の練習に臨めるようサポートしてください。

【選手データ】
名前: ${entry.user_name}
${goalLine}
日付: ${entry.entry_date}
練習種別: ${entry.menu_type}
距離/時間: ${dist} / ${time}${paceInfo}
体調: ${cond}/5　モチベーション: ${motiv}/5
本人コメント: 「${memo}」

以下の各項目を温かく、かつ専門的に回答してください：
【今日の練習の振り返り】
体調・強度・練習種別を踏まえ、今日の取り組みを肯定的に総括
【目標に向かっている点】
今日の練習が目標達成にどう貢献しているかを具体的に
【体のケアとリカバリー】
今日の練習量・強度に応じた回復のアドバイス（栄養・睡眠・ストレッチ等）
【次回のアドバイス】
無理なく続けられる、目標に向けた具体的な練習提案
【応援メッセージ】
前向きになれる温かい一言`;
  }
}

function Stars({ value, onChange, type }) {
  return (
    <div className="stars">
      {[1,2,3,4,5].map(n => (
        <div
          key={n}
          className={`star ${value >= n ? type : ''}`}
          onClick={() => onChange(n)}
        >{n}</div>
      ))}
    </div>
  );
}

function WriteTab({ form, setForm, saving, onSave, goal, setGoal }) {
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const canSave = form.user_name.trim() && form.memo.trim();

  return (
    <div className="content">
      <div className="form-group">
        <label>日付</label>
        <input type="date" value={form.entry_date} onChange={e => set('entry_date', e.target.value)} />
      </div>
      <div className="form-group">
        <label>名前</label>
        <input
          type="text" value={form.user_name} placeholder="例：佐藤 大地"
          onChange={e => { set('user_name', e.target.value); localStorage.setItem('diary_name', e.target.value); }}
        />
        <div className="sub-hint">次回から自動で入力されます</div>
      </div>
      <div className="form-group">
        <label>🎯 目標（任意）</label>
        <input
          type="text" value={goal} placeholder="例：10000m 27:30切り　箱根駅伝3区区間賞"
          onChange={e => { setGoal(e.target.value); localStorage.setItem('diary_goal', e.target.value); }}
        />
        <div className="sub-hint">AI分析で目標との整合性を評価します。変更すると次回から反映</div>
      </div>
      <div className="form-group">
        <label>練習種目</label>
        <select value={form.menu_type} onChange={e => set('menu_type', e.target.value)}>
          {MENU_TYPES.map(m => <option key={m} value={m}>{MENU_ICONS[m]} {m}</option>)}
        </select>
        <div className="menu-desc">{MENU_DESC[form.menu_type]}</div>
      </div>
      <div className="row-2">
        <div className="form-group">
          <label>距離 (km)</label>
          <input type="number" value={form.distance_km} placeholder="例：15" step="0.1"
            onChange={e => set('distance_km', e.target.value)} />
        </div>
        <div className="form-group">
          <label>時間 (分)</label>
          <input type="number" value={form.time_min} placeholder="例：75"
            onChange={e => set('time_min', e.target.value)} />
        </div>
      </div>
      <div className="form-group">
        <label>体調 ({form.condition_score}/5)</label>
        <Stars value={form.condition_score} onChange={v => set('condition_score', v)} type="cond" />
      </div>
      <div className="form-group">
        <label>モチベーション ({form.motivation_score}/5)</label>
        <Stars value={form.motivation_score} onChange={v => set('motivation_score', v)} type="motiv" />
      </div>
      <div className="form-group">
        <label>今日の練習メモ</label>
        <textarea
          value={form.memo} rows={5}
          placeholder={`今日の練習を記録してください。\nペース・本数・体の感覚・気づきなど。`}
          onChange={e => set('memo', e.target.value)}
        />
      </div>
      <div className="form-group">
        <div className="share-toggle" onClick={() => set('is_public', !form.is_public)}>
          <div className={`toggle-track ${form.is_public ? 'on' : ''}`}>
            <div className="toggle-thumb" />
          </div>
          <div className="toggle-label">
            <span>{form.is_public ? '📢 チームに公開' : '🔒 自分のみ'}</span>
            <div className="sub-hint" style={{marginTop:2}}>
              {form.is_public ? 'チーム日誌に表示されます' : 'チーム日誌には表示されません'}
            </div>
          </div>
        </div>
      </div>
      <button className="btn-primary" disabled={!canSave || saving} onClick={onSave}>
        {saving ? '投稿中...' : '📝 日誌を投稿する'}
      </button>
    </div>
  );
}

function EntryCard({ entry, aiMode, goal }) {
  const [open, setOpen] = useState(false);
  const [result, setResult] = useState(entry.ai_feedback || '');
  const [resultMode, setResultMode] = useState(entry.ai_mode || '');
  const [analyzing, setAnalyzing] = useState(false);

  const initials = entry.user_name ? entry.user_name.charAt(0) : '?';
  const dist = entry.distance_km ? `${entry.distance_km}km` : null;
  const time = entry.time_min ? `${entry.time_min}分` : null;
  const condStars = '★'.repeat(entry.condition_score || 0) + '☆'.repeat(5-(entry.condition_score||0));
  const motivStars = '★'.repeat(entry.motivation_score || 0) + '☆'.repeat(5-(entry.motivation_score||0));

  async function analyze() {
    setAnalyzing(true);
    setResult('');
    try {
      const text = await callAI(buildPrompt(entry, aiMode, goal));
      setResult(text);
      setResultMode(aiMode);
      await sb.from('diary_entries').update({ ai_feedback: text, ai_mode: aiMode }).eq('id', entry.id);
    } catch(e) {
      setResult('エラー: ' + e.message);
      setResultMode(aiMode);
    }
    setAnalyzing(false);
  }

  const btnLabel = aiMode === 'sparta' ? '🔥 スパルタ分析' : '🌸 やさしく分析';
  const btnClass = `btn-ai ${aiMode}`;

  return (
    <div className="entry-card">
      <div className="entry-header" onClick={() => setOpen(o => !o)}>
        <div className="avatar">{initials}</div>
        <div className="entry-meta">
          <div className="entry-name">{entry.user_name}</div>
          <div className="entry-date-row">{entry.entry_date}</div>
          <div className="badges">
            <span className="badge badge-menu">{MENU_ICONS[entry.menu_type] || '🏃'} {entry.menu_type}</span>
            {dist && <span className="badge badge-dist">{dist}</span>}
            {time && <span className="badge badge-time">{time}</span>}
          </div>
        </div>
        <div className="chevron">{open ? '▲' : '▼'}</div>
      </div>
      {open && (
        <div className="entry-body">
          <div className="score-row">
            <span>体調 <span style={{color:'var(--green)'}}>{condStars}</span></span>
            <span>モチベ <span style={{color:'var(--yellow)'}}>{motivStars}</span></span>
          </div>
          <div className="memo-text">{entry.memo || '（メモなし）'}</div>
          <div className="ai-section">
            <button className={btnClass} disabled={analyzing} onClick={analyze}>
              {analyzing ? <><span className="spinner">⟳</span> 分析中...</> : btnLabel}
            </button>
            {result && (
              <div>
                <div className={`ai-result ${resultMode}`}>{result}</div>
                <div className="ai-result-meta">
                  {resultMode === 'sparta' ? '🔥 スパルタモード' : '🌸 やさしめモード'} で分析
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function FeedTab({ entries, loading, aiMode, goal }) {
  if (loading) {
    return <div className="empty-state">⏳ 読み込み中...</div>;
  }
  if (!entries.length) {
    return <div className="empty-state">まだ公開された日誌がありません。<br />最初の一件を投稿してみよう！</div>;
  }
  return (
    <div className="content">
      <div className="section-hint">クリックで展開 → AIに分析させる</div>
      <div style={{height:12}} />
      {entries.map(e => <EntryCard key={e.id} entry={e} aiMode={aiMode} goal={goal} />)}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('write');
  const [aiMode, setAiMode] = useState('gentle');
  const [goal, setGoal] = useState(localStorage.getItem('diary_goal') || '');
  const [entries, setEntries] = useState([]);
  const [form, setForm] = useState(defaultForm());
  const [saving, setSaving] = useState(false);
  const [feedLoading, setFeedLoading] = useState(false);

  useEffect(() => { loadEntries(); }, []);

  async function loadEntries() {
    setFeedLoading(true);
    const { data } = await sb.from('diary_entries')
      .select('*')
      .eq('is_public', true)
      .order('entry_date', { ascending: false })
      .order('created_at', { ascending: false })
      .limit(60);
    setEntries(data || []);
    setFeedLoading(false);
  }

  async function saveEntry() {
    setSaving(true);
    const { error } = await sb.from('diary_entries').insert([{
      entry_date: form.entry_date,
      user_name: form.user_name.trim(),
      menu_type: form.menu_type,
      distance_km: form.distance_km ? parseFloat(form.distance_km) : null,
      time_min: form.time_min ? parseFloat(form.time_min) : null,
      condition_score: form.condition_score,
      motivation_score: form.motivation_score,
      memo: form.memo.trim(),
      is_public: form.is_public,
    }]);
    if (!error) {
      setForm(defaultForm());
      await loadEntries();
      setTab('feed');
    } else {
      alert('保存に失敗しました: ' + error.message);
    }
    setSaving(false);
  }

  return (
    <div>
      <div className="header">
        <div className="logo">Run<span>Diary</span></div>
        <div className="mode-toggle">
          <button
            className={`mode-btn ${aiMode === 'sparta' ? 'active-sparta' : ''}`}
            onClick={() => setAiMode('sparta')}
          >🔥 スパルタ</button>
          <button
            className={`mode-btn ${aiMode === 'gentle' ? 'active-gentle' : ''}`}
            onClick={() => setAiMode('gentle')}
          >🌸 やさしめ</button>
        </div>
      </div>
      <div className="tabs">
        <button className={`tab-btn ${tab==='write'?'active':''}`} onClick={() => setTab('write')}>
          📝 日誌を書く
        </button>
        <button className={`tab-btn ${tab==='feed'?'active':''}`} onClick={() => { setTab('feed'); loadEntries(); }}>
          📋 チーム日誌
        </button>
      </div>
      {tab === 'write' && <WriteTab form={form} setForm={setForm} saving={saving} onSave={saveEntry} goal={goal} setGoal={setGoal} />}
      {tab === 'feed' && <FeedTab entries={entries} loading={feedLoading} aiMode={aiMode} goal={goal} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
